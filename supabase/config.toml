# ClearTalk Supabase Configuration

project_id = "your-project-id"

[api]
enabled = true
port = 54321
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true

[inbucket]
enabled = true

[storage]
enabled = true
file_size_limit = "50MB"

[storage.buckets.message-attachments]
public = false
file_size_limit = "10MB"
allowed_mime_types = ["image/*", "application/pdf", "video/*", "audio/*"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:8081"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false
